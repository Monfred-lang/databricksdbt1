name: dbt build and test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.12"

jobs:
  dbt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dbt packages
        run: dbt deps

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          echo "shopflow_analytics:" > ~/.dbt/profiles.yml
          echo "  target: ci" >> ~/.dbt/profiles.yml
          echo "  outputs:" >> ~/.dbt/profiles.yml
          echo "    ci:" >> ~/.dbt/profiles.yml
          echo "      type: databricks" >> ~/.dbt/profiles.yml
          echo "      host: ${{ secrets.DATABRICKS_HOST }}" >> ~/.dbt/profiles.yml
          echo "      http_path: ${{ secrets.DATABRICKS_HTTP_PATH }}" >> ~/.dbt/profiles.yml
          echo "      schema: ${{ secrets.DBT_SCHEMA || 'silver' }}" >> ~/.dbt/profiles.yml
          echo "      catalog: ${{ secrets.DATABRICKS_CATALOG || 'workspace' }}" >> ~/.dbt/profiles.yml
          echo "      token: ${{ secrets.DATABRICKS_TOKEN }}" >> ~/.dbt/profiles.yml
          echo "      threads: 4" >> ~/.dbt/profiles.yml

      - name: dbt seed
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: dbt seed

      - name: dbt snapshot
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: dbt snapshot

      - name: dbt run
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: dbt run

      - name: dbt test
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_HTTP_PATH: ${{ secrets.DATABRICKS_HTTP_PATH }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: dbt test
