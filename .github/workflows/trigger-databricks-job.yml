name: Trigger Databricks dbt job

on:
  push:
    branches: [main, master]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Databricks job
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          JOB_NAME: shopflow-dbt-pipeline
        run: |
          if [ -z "$DATABRICKS_HOST" ] || [ -z "$DATABRICKS_TOKEN" ]; then
            echo "Skipping: DATABRICKS_HOST or DATABRICKS_TOKEN not set"
            exit 0
          fi
          host="${DATABRICKS_HOST#https://}"
          host="${host#http://}"
          url="https://${host}/api/2.1/jobs/run-now"
          echo "Triggering job: $JOB_NAME"
          curl -s -X POST "$url" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"job_name\": \"$JOB_NAME\"}" | tee /tmp/out.json
          if grep -q '"run_id"' /tmp/out.json; then
            echo "Job triggered successfully"
          else
            echo "Response: $(cat /tmp/out.json)"
            exit 1
          fi
