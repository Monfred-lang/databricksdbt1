shopflow_analytics:
  target: dev
  outputs:
    dev:
      type: databricks
      host: "dbc-aef35066-afa2.cloud.databricks.com"
      http_path: "/sql/1.0/warehouses/6f9ea3149e2abcf0"
      catalog: workspace
      schema: silver
      token: "dapi..."
      threads: 4
      connect_timeout: 60
      connect_retries: 3

    prod:
      type: databricks
      host: "{{ env_var('DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
