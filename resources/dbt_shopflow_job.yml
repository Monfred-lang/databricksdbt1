resources:
  jobs:
    ShopFlow:
      name: ShopFlow
      tasks:
        - task_key: run_dbt_job
          dbt_task:
            project_directory: ${workspace.root_path}/files/
            commands:
              - dbt deps
              - dbt seed
              - dbt run
              - dbt snapshot
              - dbt test
            schema: bronze
            warehouse_id: ${var.warehouse_id}
            catalog: ${var.catalog}
            source: WORKSPACE
          environment_key: dbt-default
      queue:
        enabled: true
      environments:
        - environment_key: dbt-default
          spec:
            dependencies:
              - dbt-databricks>=1.0.0,<2.0.0
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
